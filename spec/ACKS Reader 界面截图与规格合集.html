function Stage({ sc, active }) {
  const tweaks = { radiusStyle:'platform', uiFont:'grotesk', toolbarVariant:'capsule', accentMode:'orange' };
  const boot = Object.assign({ chrome:'0', capture:'1' }, sc.boot);
  return (
    <div className="stage" data-idx={sc.n}>
      <div className="num">{sc.n}</div>
      {active
        ? <div className="scaler"><window.ACKSReaderApp platform={sc.platform} shellDark={sc.dark} tweaks={tweaks} boot={boot} /></div>
        : <div className="loading" style={{minHeight:560}}><div className="spin"></div>滚动到此处渲染</div>}
    </div>
  );
}

function Collection() {
  const flat = [];
  SCREENS.forEach(g => g.items.forEach(it => flat.push(it.n)));
  const [active, setActive] = React.useState(() => new Set([flat[0], flat[1]])); // eager first two
  const wrapRef = React.useRef(null);
  React.useEffect(() => {
    const scan = () => {
      const vh = window.innerHeight || 800;
      const nodes = wrapRef.current ? wrapRef.current.querySelectorAll('.stage') : [];
      let add = null;
      nodes.forEach(n => {
        const idx = +n.getAttribute('data-idx');
        if (active.has(idx)) return;
        const r = n.getBoundingClientRect();
        if (r.top < vh + 700 && r.bottom > -700) { (add = add || new Set(active)).add(idx); }
      });
      if (add) setActive(add);
    };
    let tick = false;
    const onScroll = () => { if (tick) return; tick = true; requestAnimationFrame(() => { tick = false; scan(); }); };
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    const t1 = setTimeout(scan, 200), t2 = setTimeout(scan, 800);
    return () => { window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onScroll); clearTimeout(t1); clearTimeout(t2); };
  }, [active]);
  return (
    <div ref={wrapRef}>
      {SCREENS.map(grp => (
        <React.Fragment key={grp.group}>
          <div className="group-head"><div className="gk">{grp.groupKey}</div><h2>{grp.group}</h2></div>
          <div className="screens">
            {grp.items.map(sc => (
              <div className="screen" key={sc.n}>
                <Stage sc={sc} active={active.has(sc.n)} />
                <div className="spec">
                  <h3>{sc.title}<span className="plat">{sc.plat}</span></h3>
                  <div className="en">{sc.en}</div>
                  <div className="desc">{sc.desc}</div>
                  <h4>解剖 · Anatomy</h4>
                  <div className="anat">{sc.anat.map((a,i)=><div className="row" key={i}><b>{a[0]}</b><span>{a[1]}</span></div>)}</div>
                  <h4>行为 · Behavior</h4>
                  <ul className="behav">{sc.behav.map((b,i)=><li key={i}>{b}</li>)}</ul>
                </div>
              </div>
            ))}
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

(function boot(){
  if (!window.ACKSReaderApp || !window.THEMES) { setTimeout(boot, 120); return; }
  // ensure all theme fonts are present in this document
  if (!document.getElementById('acks-theme-fonts') && window.THEME_FONTS_HREF) {
    const l = document.createElement('link'); l.id='acks-theme-fonts'; l.rel='stylesheet'; l.href=window.THEME_FONTS_HREF; document.head.appendChild(l);
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<Collection />);
})();
</script>
</body>
</html>
