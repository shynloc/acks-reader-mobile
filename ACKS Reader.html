<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACKS Reader — UI/UX 原型</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow: hidden; background: #0A0A0B; }
  #root { height: 100vh; }
  input, button, select, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(140,140,150,0.4); border-radius: 4px; }
  @keyframes acksShimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  @keyframes acksSpin { to { transform: rotate(360deg); } }
  @keyframes acksSlideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes acksRipple { from { transform: scale(0); opacity: 0.55; } to { transform: scale(1); opacity: 0; } }
  @keyframes acksFabIn { from { transform: scale(0) rotate(-45deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
  /* system-font override for app chrome (beats inline styles) */
  .acks-sysfont, .acks-sysfont :not(iframe):not(svg):not(path) {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif !important;
  }
</style>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="bgr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F26419"/><stop offset="1" stop-color="#E31E24"/></linearGradient></defs>
    <rect width="100" height="100" rx="22" fill="url(#bgr)"/>
    <path d="M35 68 L35 32 L50 56 L50 32 M58 68 L68 32 L78 68 M61 56 L75 56" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.96"/>
  </svg>
</template>
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="render-core/markdown.js"></script>
<script type="text/babel" src="render-core/extensions.js"></script>
<script type="text/babel" src="render-core/themes.js"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/states.jsx"></script>
<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/screen-preview.jsx"></script>
<script type="text/babel" src="app/screen-panels.jsx"></script>
<script type="text/babel" src="app/screen-misc.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
